<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found on Himel Das portfolio website. Return to home or contact directly.">
    <meta property="og:title" content="Page Not Found | Himel Das">
    <meta property="og:description" content="The page you requested could not be found. Navigate back to Himel Das portfolio home.">
    <meta property="og:image" content="/res/himel_portfolio_profile.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Page Not Found | Himel Das">
    <meta name="twitter:description" content="The page you requested could not be found.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; connect-src 'self';">
    <title>Page Not Found | Himel Das</title>
    <link rel="stylesheet" href="/css/preloader.css">
    <script src="/js/preloader.js"></script>
    <link href="/res/fonts/remixicon.css" rel="stylesheet" media="print" data-deferred>
    <link rel="stylesheet" href="/css/style.css" media="print" data-deferred>

</head>
<body>
    <div id="preloader" aria-label="Loading">
      <svg class="pulsar" viewBox="0 0 100 100" width="80" height="80">
        <defs>
          <radialGradient id="core-glow-grad">
            <stop offset="0%" stop-color="currentColor" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="beam-fade-up" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="currentColor" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="beam-fade-down" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="currentColor" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <ellipse cx="50" cy="50" rx="20" ry="6" class="pulse-ring"/>
        <ellipse cx="50" cy="50" rx="32" ry="9.6" class="pulse-ring d2"/>
        <ellipse cx="50" cy="50" rx="44" ry="13.2" class="pulse-ring d3"/>
        <g class="pulsar-beams">
          <polygon points="46,40 50,4 54,40" fill="url(#beam-fade-up)"/>
          <polygon points="46,60 50,96 54,60" fill="url(#beam-fade-down)"/>
        </g>
        <ellipse cx="50" cy="50" rx="18" ry="5" class="pulsar-disk"/>
        <circle cx="50" cy="50" r="14" fill="url(#core-glow-grad)" class="pulsar-aura"/>
        <circle cx="50" cy="50" r="4" fill="currentColor" class="pulsar-core"/>
      </svg>
    </div>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Theme toggle button -->
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <i class="ri-lg ri-moon-clear-fill"></i>
    </button>
    
    <!-- Space elements for visual interest -->
    <div id="space-container"></div>
    
    <main class="error-container" id="main-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The cosmos is vast, and sometimes we venture into uncharted territory. The page you're looking for seems to have drifted into a different dimension.</p>
        
        <div class="buttons-container">
            <a href="index.html" class="button">
                <i class="ri-home-4-line"></i> Return Home <i class="ri-arrow-right-line"></i>
            </a>
            <a href="mailto:hello2himel@proton.me" class="button">
                <i class="ri-mail-line"></i> Contact Me <i class="ri-arrow-right-line"></i>
            </a>
        </div>
        
        <div class="home-link">
            <p>&copy; 2026 Himel Das - <a href="index.html">Bogura, Bangladesh</a></p>
        </div>
    </main>
<script src="/js/scripts.js"></script>
</body>
</html>
