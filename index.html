<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Himel Das portfolio featuring projects, publications, leadership, achievements, and vision." />
  <meta property="og:title" content="Himel Das | Portfolio" />
  <meta property="og:description" content="Explore Himel Das's projects, publications, leadership, and achievements." />
  <meta property="og:image" content="/res/himel_portfolio_profile.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Himel Das | Portfolio" />
  <meta name="twitter:description" content="Explore Himel Das's projects, publications, leadership, and achievements." />
  <meta name="twitter:image" content="/res/himel_portfolio_profile.png" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self';" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Himel Das",
      "jobTitle": "Physics Student & Researcher",
      "url": "https://hello2himel.github.io/"
    }
  </script>
  <title>Himel Das | Portfolio</title>
  <link rel="stylesheet" href="/css/preloader.css">
  <script src="/js/preloader.js"></script>
  <link href="/res/fonts/remixicon.css" rel="stylesheet" media="print" data-deferred>
  <link rel="stylesheet" href="/css/style.css" media="print" data-deferred>
</head>

<body>
  <div id="preloader" aria-label="Loading"></div>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <!-- Space container for animation -->
  <div id="space-container"></div>
  <div class="overlay" id="overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-controls">
      <button class="sidebar-button" id="theme-toggle-sidebar" title="Toggle theme" aria-label="Toggle theme">
        <i class="ri-lg ri-moon-clear-fill"></i>
      </button>
      <button class="sidebar-button" id="sidebar-collapse" title="Collapse sidebar" aria-label="Collapse sidebar" aria-expanded="false">
        <i class="ri-lg ri-arrow-right-s-line"></i>
      </button>
    </div>
    <div class="sidebar-menu">
      <a href="#projects" class="sidebar-link">
        <i class="ri-lg ri-git-branch-line"></i> <span>Projects</span>
      </a>
      <a href="#publications" class="sidebar-link">
        <i class="ri-lg ri-book-line"></i> <span>Publications</span>
      </a>
      <a href="#leadership" class="sidebar-link">
        <i class="ri-lg ri-group-line"></i> <span>Leadership</span>
      </a>
      <a href="#achievements" class="sidebar-link">
        <i class="ri-lg ri-trophy-line"></i> <span>Achievements</span>
      </a>
      <a href="#vision" class="sidebar-link">
        <i class="ri-lg ri-eye-line"></i> <span>Vision</span>
      </a>
      <div class="sidebar-divider"></div>
      <a href="/blog/" class="sidebar-link" aria-label="Read Blog">
        <i class="ri-lg ri-quill-pen-ai-line"></i> <span>Read Blog</span>
      </a>
      <a href="mailto:hello2himel@proton.me" class="sidebar-link">
        <i class="ri-lg ri-mail-line"></i> <span>Contact Me</span>
      </a>
      <a href="https://github.com/hello2himel" class="sidebar-link" target="_blank" rel="noopener noreferrer" aria-label="View Projects (opens in a new tab)">
        <i class="ri-lg ri-github-line"></i> <span>View Projects</span>
      </a>
    </div>
  </div>
  <!-- Fixed position control buttons at top right -->
  <div class="header-controls">
    <button class="header-button" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
      <i class="ri-lg ri-moon-clear-fill"></i>
    </button>
    <button class="header-button" id="menu-toggle" title="Menu" aria-label="Toggle menu">
      <i class="ri-lg ri-menu-2-line"></i>
    </button>
  </div>
  <main class="main-container" id="main-content">
    <div class="profile-section">
      <div class="profile-header">
        <div class="profile-img-container">
          <img src="/res/himel_portfolio_profile.png" alt="Himel Das" class="profile-img" loading="lazy" width="150" height="150">
        </div>
        <div class="profile-name-title">
          <h1>Himel Das</h1>
          <div class="tags">
            <!-- Tags will be loaded from /res/data.json -->
          </div>
        </div>
      </div>
      <div class="profile-content">
        <p class="bio-highlight">
          <!-- Bio will be loaded from /res/data.json -->
        </p>
         <div class="contact-buttons">
          <!-- Contact buttons will be loaded from /res/data.json -->
        </div>
      </div>
    </div>
    <section class="section" id="projects">
      <h2>Current Projects</h2>
      <div class="projects-grid">
        <!-- Projects will be loaded from /res/data.json -->
      </div>
    </section>
    <section class="section" id="publications">
      <h2>Publications</h2>
      <div class="projects-grid">
        <!-- Publications will be loaded from /res/data.json -->
      </div>
    </section>
    <section class="section" id="leadership">
      <h2>Leadership</h2>
      <div class="leadership-list">
        <!-- Leadership items will be loaded from /res/data.json -->
      </div>
    </section>
    <section class="section" id="achievements">
      <h2>Achievements</h2>
      <div class="achievements-grid">
        <!-- Achievements will be loaded from /res/data.json -->
      </div>
    </section>
    <section class="section" id="vision">
      <h2>Vision</h2>
      <!-- Vision paragraphs will be loaded from /res/data.json -->
    </section>
    <footer>
      &copy; 2026 Himel Das - Bogura, Bangladesh
    </footer>
  </main>
  <script src="/js/scripts.js"></script>
</body>

</html>
