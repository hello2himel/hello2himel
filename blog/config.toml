baseURL = 'https://hello2himel.netlify.app/blog/'
title = "Himel Das | Blog"
theme = 'stargzr'
defaultContentLanguage = 'bn'
defaultContentLanguageInSubdir = false

[params]
  env = "production"
  description = "Thoughts on astrophysics, FOSS, and technology"
  author = "Himel Das"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true

  [[params.socialIcons]]
    name = "email"
    url = "mailto:hello2himel@proton.me"
  
  [[params.socialIcons]]
    name = "telegram"
    url = "https://t.me/hello2himel"
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/hello2himel"

[languages]
  [languages.bn]
    languageCode = 'bn'
    languageName = 'বাংলা'
    weight = 1
    [languages.bn.params]
      description = "জ্যোতির্পদার্থবিদ্যা, FOSS এবং প্রযুক্তি নিয়ে ভাবনা"
    [[languages.bn.menu.main]]
      name = "হোম"
      url = "/"
      weight = 10
    [[languages.bn.menu.main]]
      name = "ব্লগ"
      url = "/"
      weight = 20
    [[languages.bn.menu.main]]
      name = "ট্যাগ"
      url = "/tags/"
      weight = 30
    [[languages.bn.menu.main]]
      name = "খুঁজুন"
      url = "/search/"
      weight = 40

  [languages.en]
    languageCode = 'en'
    languageName = 'English'
    weight = 2
    [languages.en.params]
      description = "Thoughts on astrophysics, FOSS, and technology"
    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 10
    [[languages.en.menu.main]]
      name = "Blog"
      url = "/en/"
      weight = 20
    [[languages.en.menu.main]]
      name = "Tags"
      url = "/en/tags/"
      weight = 30
    [[languages.en.menu.main]]
      name = "Search"
      url = "/en/search/"
      weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]