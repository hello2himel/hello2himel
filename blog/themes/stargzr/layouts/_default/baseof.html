<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/blog.css" | relURL }}">
  {{- if .OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ (.OutputFormats.Get "RSS").Permalink }}">
  {{- end }}
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="space-container"></div>
  <div class="container">
    {{- partial "header.html" . -}}
    <main>
      {{- block "main" . }}{{ end -}}
    </main>
    {{- partial "footer.html" . -}}
  </div>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      function updateIcon() {
        var theme = document.documentElement.getAttribute('data-theme');
        btn.textContent = theme === 'dark' ? '☀' : '☾';
      }
      updateIcon();
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon();
      });
    })();
  </script>
  <script>
    (function() {
      var container = document.getElementById('space-container');
      if (!container) return;
      var sizes = ['small', 'medium', 'large'];
      var count = window.innerWidth <= 768 ? 35 : 70;
      for (var i = 0; i < count; i++) {
        var s = document.createElement('div');
        s.className = 'star ' + sizes[Math.floor(Math.random() * sizes.length)];
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(s);
      }
      if (window.innerWidth > 768) {
        var stars = container.querySelectorAll('.star');
        document.addEventListener('mousemove', function(e) {
          var mx = (e.clientX / window.innerWidth) * 2 - 1;
          var my = (e.clientY / window.innerHeight) * 2 - 1;
          stars.forEach(function(star) {
            var d = star.classList.contains('small') ? 0.3 : star.classList.contains('large') ? 0.7 : 0.5;
            star.style.transform = 'translate(' + (-mx * d * 50) + 'px,' + (-my * d * 50) + 'px)';
          });
        });
      }
    })();
  </script>
</body>
</html>
